<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zadania">
<meta name="theme-color" content="#1a1d27">
<link rel="manifest" href="manifest.json">
<title>Bot zadań</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f1117; color: #e8e8e8;
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}

#setup-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; gap: 20px;
}
#setup-screen h2 { font-size: 22px; font-weight: 600; color: #fff; }
#setup-screen p { font-size: 14px; color: #6b7280; text-align: center; line-height: 1.6; max-width: 340px; }
#setup-screen a { color: #818cf8; }
.setup-field { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 8px; }
.setup-field label { font-size: 13px; color: #9ca3af; }
.setup-field input {
  background: #1a1d27; border: 1px solid #374151; border-radius: 10px;
  padding: 12px 14px; color: #e8e8e8; font-size: 15px; outline: none; width: 100%;
}
.setup-field input:focus { border-color: #4f46e5; }
#setup-btn {
  background: #4f46e5; color: white; border: none; border-radius: 10px;
  padding: 13px 32px; font-size: 15px; font-weight: 600; cursor: pointer;
  width: 100%; max-width: 380px;
}

#app { display: none; flex-direction: column; height: 100dvh; }
#app.visible { display: flex; }

#header {
  background: #1a1d27; border-bottom: 1px solid #2a2d3e;
  padding: 12px 16px; padding-top: max(12px, env(safe-area-inset-top));
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.dot { width: 9px; height: 9px; background: #4ade80; border-radius: 50%; flex-shrink: 0; }
#header h1 { font-size: 15px; font-weight: 600; color: #fff; flex: 1; }
#task-count { font-size: 12px; color: #6b7280; }
#settings-btn { background: none; border: none; color: #6b7280; font-size: 18px; cursor: pointer; padding: 0 4px; }

#users-bar {
  background: #161820; border-bottom: 1px solid #2a2d3e;
  padding: 8px 16px; display: flex; gap: 8px; align-items: center; flex-shrink: 0;
}
#users-bar label { font-size: 12px; color: #6b7280; }
.user-btn {
  padding: 4px 14px; border-radius: 20px; border: 1px solid #2a2d3e;
  background: transparent; color: #9ca3af; font-size: 13px; cursor: pointer; transition: all 0.15s;
}
.user-btn:hover { border-color: #4f46e5; color: #818cf8; }
.user-btn.active { background: #312e81; border-color: #4f46e5; color: #c7d2fe; font-weight: 600; }

.help-hint {
  font-size: 11px; color: #4b5563; padding: 5px 16px 6px;
  background: #161820; border-bottom: 1px solid #2a2d3e;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0;
}

#chat {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
  -webkit-overflow-scrolling: touch;
}

.msg { display: flex; gap: 8px; max-width: 88%; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)} }
.msg.user { margin-left: auto; flex-direction: row-reverse; }
.msg.bot { margin-right: auto; }
.msg.notify { margin-right: auto; max-width: 100%; width: 100%; }

.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
}
.avatar.anton { background: #312e81; color: #c7d2fe; }
.avatar.michal { background: #7f1d1d; color: #fca5a5; }
.avatar.bot { background: #064e3b; color: #6ee7b7; }
.avatar.bell { background: #78350f; color: #fcd34d; font-size: 13px; }

.bubble { padding: 9px 13px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; }
.msg.user .bubble { background: #1e1b4b; border: 1px solid #3730a3; color: #e0e7ff; }
.msg.bot .bubble { background: #1a1d27; border: 1px solid #2a2d3e; color: #d1d5db; }
.msg.notify .bubble { background: #1c1a0f; border: 1px solid #92400e; color: #fcd34d; font-size: 13px; }

.msg-meta { font-size: 11px; color: #374151; margin-top: 3px; }
.msg.user .msg-meta { text-align: right; }

/* TASK CARDS */
.task-section-title {
  font-size: 11px; font-weight: 600; color: #6b7280;
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 10px 0 4px; border-top: 1px solid #1f2937; margin-top: 4px;
}
.task-section-title:first-child { border-top: none; padding-top: 4px; }

.task-card {
  background: #111827; border: 1px solid #374151;
  border-radius: 10px; padding: 9px 12px; margin-top: 5px; font-size: 13px;
  border-left-width: 3px;
}
.task-card.normal { border-left-color: #374151; }
.task-card.urgent { border-left-color: #ef4444; background: #180e0e; }
.task-card.anp { border-left-color: #8b5cf6; background: #0f0b1a; }
.task-card.done-card { border-left-color: #374151; opacity: 0.45; }

.task-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; }
.task-text { flex: 1; line-height: 1.4; }
.task-card.done-card .task-text { text-decoration: line-through; color: #6b7280; }
.task-badges { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

.badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
.badge-anton { background: #1e1b4b; color: #a5b4fc; }
.badge-michal { background: #450a0a; color: #fca5a5; }
.badge-obaj { background: #1c1917; color: #d6d3d1; }
.badge-done { background: #052e16; color: #4ade80; }
.badge-urgent { background: #450a0a; color: #f87171; }
.badge-anp { background: #2e1065; color: #c4b5fd; }

.typing {
  display: flex; gap: 4px; align-items: center; padding: 10px 13px;
  background: #1a1d27; border: 1px solid #2a2d3e; border-radius: 14px; width: fit-content;
}
.typing span { width: 6px; height: 6px; background: #6b7280; border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)} }

#input-area {
  background: #1a1d27; border-top: 1px solid #2a2d3e;
  padding: 10px 14px; padding-bottom: max(10px, env(safe-area-inset-bottom));
  display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
}
#msg-input {
  flex: 1; background: #111827; border: 1px solid #374151; border-radius: 10px;
  padding: 10px 13px; color: #e8e8e8; font-size: 16px; resize: none; outline: none;
  min-height: 42px; max-height: 110px; font-family: inherit; transition: border-color 0.15s;
  -webkit-appearance: none;
}
#msg-input:focus { border-color: #4f46e5; }
#send-btn {
  background: #4f46e5; border: none; color: white;
  width: 42px; height: 42px; border-radius: 10px; cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
#send-btn:hover { background: #4338ca; }
#send-btn:disabled { background: #374151; cursor: not-allowed; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
</style>
</head>
<body>

<div id="setup-screen">
  <div style="font-size: 48px;">✓</div>
  <h2>Bot zadań</h2>
  <p>Wpisz swój klucz Groq API.<br>Znajdziesz go na <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a></p>
  <div class="setup-field">
    <label>Klucz API (zaczyna się od gsk_...)</label>
    <input type="password" id="api-key-input" placeholder="gsk_..." autocomplete="off" spellcheck="false">
  </div>
  <button id="setup-btn" onclick="saveApiKey()">Zacznij</button>
</div>

<div id="app">
  <div id="header">
    <div class="dot"></div>
    <h1>Bot zadań</h1>
    <span id="task-count">0 aktywnych</span>
    <button id="settings-btn" onclick="resetApiKey()" title="Zmień klucz API">⚙</button>
  </div>
  <div id="users-bar">
    <label>Piszę jako:</label>
    <button class="user-btn active" onclick="setUser('Anton', this)">Anton</button>
    <button class="user-btn" onclick="setUser('Michał', this)">Michał</button>
  </div>
  <div class="help-hint">
    Np: "Anton, pilne — zadzwoń do klienta ANP" · "moje zadania" · "archiwum" · "Zapłacona"
  </div>
  <div id="chat"></div>
  <div id="input-area">
    <textarea id="msg-input" placeholder="Napisz wiadomość..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMsg()">↑</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8fvygcYQoHosYWpUdVMJQTurboUz_Bf4",
  authDomain: "tasks-a4b78.firebaseapp.com",
  projectId: "tasks-a4b78",
  storageBucket: "tasks-a4b78.firebasestorage.app",
  messagingSenderId: "620358355411",
  appId: "1:620358355411:web:cd0773cf9ea9adfd16c726"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const tasksCol = collection(db, 'tasks');

// ── helpers ──────────────────────────────────────────────
const isUrgent = t => /pilne|pilnie|pilny|pilna|срочно|urgent/i.test(t);
const isANP    = t => /\bANP\b/.test(t);

const SYSTEM_PROMPT = `Jesteś asystentem do zarządzania zadaniami dla Antona i Michała.
Zwracaj WYŁĄCZNIE czysty JSON bez żadnego tekstu przed ani po.

Możliwe akcje:

1. Dodanie zadania:
{"action":"add_task","reply":"krótka odpowiedź po polsku","task":{"text":"opis zadania","assignee":"Anton lub Michał lub obaj"}}

2. Oznaczenie zadania jako wykonane — dopasuj KONTEKSTOWO do listy zadań:
{"action":"complete_task","reply":"krótka odpowiedź po polsku","complete_id":"ID_ZADANIA"}
Jeśli nie pasuje żadne zadanie: {"action":"complete_task","reply":"...","complete_id":null}

3. Lista aktywnych zadań:
{"action":"list_tasks","reply":"...","filter":"Anton lub Michał lub all"}

4. Archiwum wykonanych zadań:
{"action":"archive","reply":"...","filter":"Anton lub Michał lub all"}

5. Zwykła rozmowa:
{"action":"chat","reply":"..."}

WAŻNE przy complete_task: "Zapłacona" pasuje do "sprawdź fakturę", "Umówiony" pasuje do "umów Rafała", "Gotowe" pasuje do ostatniego zadania na liście. Zawsze zwracaj ID z listy aktywnych zadań.
WAŻNE przy archive: użyj tej akcji gdy ktoś pyta o "archiwum", "wykonane zadania", "historia", "zrobione zadania".
reply: max 1-2 zdania po polsku.`;

let currentUser = 'Anton';
let tasks = [];
let apiKey = '';
let knownIds = new Set();
let initialized = false;

// ── Firebase ──────────────────────────────────────────────
const q = query(tasksCol, orderBy('createdAt', 'asc'));
onSnapshot(q, snapshot => {
  const fresh = snapshot.docs.map(d => ({ ...d.data(), fid: d.id }));

  if (initialized) {
    fresh.forEach(t => {
      if (!knownIds.has(t.fid) && !t.done && t.createdBy && t.createdBy !== currentUser) {
        const forme = t.assignee === currentUser || t.assignee === 'obaj';
        if (forme) showNotification(`${t.createdBy} dodał Ci nowe zadanie: "${t.text}"`);
      }
    });
  }

  tasks = fresh;
  knownIds = new Set(tasks.map(t => t.fid));
  updateCount();
  initialized = true;
});

// ── UI helpers ────────────────────────────────────────────
window.saveApiKey = () => {
  const v = document.getElementById('api-key-input').value.trim();
  if (!v.startsWith('gsk_')) { alert('Klucz powinien zaczynać się od "gsk_"'); return; }
  apiKey = v;
  localStorage.setItem('taskbot_groq_key', v);
  showApp();
};

window.resetApiKey = () => {
  if (!confirm('Zmienić klucz API?')) return;
  localStorage.removeItem('taskbot_groq_key');
  apiKey = '';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('setup-screen').style.display = 'flex';
};

window.setUser = (name, btn) => {
  currentUser = name;
  document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
};

function showApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  addMsg('bot', 'Cześć! Napisz zadanie albo zapytaj co masz do zrobienia.', 'Bot');
  document.getElementById('msg-input').focus();
  if (Notification.permission === 'default') Notification.requestPermission();
}

function getTime() {
  return new Date().toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
}

function updateCount() {
  document.getElementById('task-count').textContent = `${tasks.filter(t => !t.done).length} aktywnych`;
}

function addMsg(role, text, sender, extra) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = `msg ${role === 'bot' ? 'bot' : 'user'}`;
  const ac = role === 'bot' ? 'bot' : (sender === 'Anton' ? 'anton' : 'michal');
  const al = role === 'bot' ? 'AI' : sender[0];
  d.innerHTML = `<div class="avatar ${ac}">${al}</div><div style="min-width:0"><div class="bubble">${text}${extra||''}</div><div class="msg-meta">${sender} · ${getTime()}</div></div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function showNotification(text) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg notify';
  d.innerHTML = `<div class="avatar bell">🔔</div><div style="min-width:0"><div class="bubble">${text}</div><div class="msg-meta">Powiadomienie · ${getTime()}</div></div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  if (Notification.permission === 'granted') new Notification('Bot zadań', { body: text });
}

function showTyping() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = `<div class="avatar bot">AI</div><div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

// ── Task rendering ────────────────────────────────────────
function taskCard(t) {
  const urgent = isUrgent(t.text);
  const anp    = isANP(t.text);
  const cls    = t.done ? 'done-card' : (urgent ? 'urgent' : (anp ? 'anp' : 'normal'));
  const ac     = t.assignee === 'Anton' ? 'badge-anton' : t.assignee === 'Michał' ? 'badge-michal' : 'badge-obaj';
  return `<div class="task-card ${cls}">
    <div class="task-row">
      <span class="task-text">${t.text}</span>
      <div class="task-badges">
        ${urgent ? '<span class="badge badge-urgent">Pilne</span>' : ''}
        ${anp    ? '<span class="badge badge-anp">ANP</span>' : ''}
        <span class="badge ${t.done ? 'badge-done' : ac}">${t.done ? '✓' : t.assignee}</span>
      </div>
    </div>
  </div>`;
}

function renderActive(list) {
  if (!list.length) return '<div style="color:#4b5563;font-size:13px;margin-top:6px;">Brak zadań.</div>';
  const urgent = list.filter(t => isUrgent(t.text));
  const anp    = list.filter(t => !isUrgent(t.text) && isANP(t.text));
  const normal = list.filter(t => !isUrgent(t.text) && !isANP(t.text));
  let h = '';
  if (urgent.length) h += `<div class="task-section-title">🔴 Pilne</div>${urgent.map(taskCard).join('')}`;
  if (anp.length)    h += `<div class="task-section-title">🟣 ANP</div>${anp.map(taskCard).join('')}`;
  if (normal.length) h += `<div class="task-section-title">Zwykłe</div>${normal.map(taskCard).join('')}`;
  return h;
}

function renderArchive(list) {
  if (!list.length) return '<div style="color:#4b5563;font-size:13px;margin-top:6px;">Archiwum jest puste.</div>';
  return `<div class="task-section-title">Wykonane zadania (${list.length})</div>${list.map(taskCard).join('')}`;
}

// ── AI call ───────────────────────────────────────────────
async function callAI(msg) {
  const active = tasks.filter(t => !t.done).slice(-20);
  const tlist = active.length
    ? active.map(t => `ID:${t.fid} [${t.assignee}] "${t.text}"`).join('\n')
    : '(brak aktywnych zadań)';

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      temperature: 0.1,
      max_tokens: 600,
      messages: [
        { role: 'system', content: SYSTEM_PROMPT },
        { role: 'user', content: `Piszący: ${currentUser}\nWiadomość: "${msg}"\n\nAktywne zadania:\n${tlist}` }
      ]
    })
  });
  if (!res.ok) { const e = await res.text(); throw new Error(`API ${res.status}: ${e.slice(0,200)}`); }
  const data = await res.json();
  const raw = data.choices?.[0]?.message?.content || '';
  console.log('AI:', raw);
  const m = raw.match(/\{[\s\S]*\}/);
  if (!m) throw new Error(`Zły JSON: "${raw.slice(0,100)}"`);
  return JSON.parse(m[0]);
}

// ── Send ──────────────────────────────────────────────────
window.sendMsg = async () => {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  addMsg('user', text, currentUser);
  showTyping();

  try {
    const r = await callAI(text);
    hideTyping();
    let reply = r.reply || 'OK.';
    let extra = '';

    if (r.action === 'add_task' && r.task) {
      const t = {
        text: r.task.text,
        assignee: r.task.assignee || currentUser,
        done: false,
        createdBy: currentUser,
        createdAt: Date.now()
      };
      await addDoc(tasksCol, t);
      extra = taskCard({ ...t, fid: 'new' });

    } else if (r.action === 'complete_task') {
      const found = r.complete_id ? tasks.find(t => !t.done && t.fid === r.complete_id) : null;
      if (found) {
        await updateDoc(doc(db, 'tasks', found.fid), { done: true, doneAt: Date.now(), doneBy: currentUser });
        extra = taskCard({ ...found, done: true });
      } else {
        reply = 'Nie znalazłem pasującego zadania. Wpisz "moje zadania" żeby sprawdzić listę.';
      }

    } else if (r.action === 'list_tasks') {
      const f = r.filter || 'all';
      const list = f === 'all'
        ? tasks.filter(t => !t.done)
        : tasks.filter(t => !t.done && (t.assignee === f || t.assignee === 'obaj'));
      if (!list.length) reply = 'Brak aktywnych zadań' + (f !== 'all' ? ` dla ${f}` : '') + '.';
      else extra = renderActive(list);

    } else if (r.action === 'archive') {
      const f = r.filter || 'all';
      const list = f === 'all'
        ? tasks.filter(t => t.done)
        : tasks.filter(t => t.done && (t.assignee === f || t.assignee === 'obaj'));
      extra = renderArchive(list);
      if (!list.length) reply = 'Archiwum jest puste.';
    }

    addMsg('bot', reply, 'Bot', extra);
  } catch(e) {
    hideTyping();
    addMsg('bot', `Błąd: ${e.message}`, 'Bot');
  }

  document.getElementById('send-btn').disabled = false;
  document.getElementById('msg-input').focus();
};

document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMsg(); }
});

const saved = localStorage.getItem('taskbot_groq_key');
if (saved?.startsWith('gsk_')) { apiKey = saved; showApp(); }
</script>
</body>
</html>
